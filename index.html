<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Controle Financeiro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Minhas Finanças 💰</h1>
            <p class="welcome">Organize seu dinheiro em tempo real</p>
        </header>

        <div class="balance-card">
            <h3>Saldo Atual</h3>
            <p class="balance-value">R$ 0,00</p>
        </div>
        
        <div class="cards-grid">
            <div class="card entrada">
                <div class="card-icon">🔼</div>
                <div>
                    <h3>Entradas</h3>
                    <p>R$ 0,00</p>
                </div>
            </div>
            <div class="card saida">
                <div class="card-icon">🔽</div>
                <div>
                    <h3>Saídas</h3>
                    <p>R$ 0,00</p>
                </div>
            </div>
        </div>

        <section class="history-section">
            <div class="section-header">
                <h2>Últimos Registros</h2>
                <span class="see-all">Ver tudo</span>
            </div>
            <div class="transaction-list">
                <div class="transaction-item item-entrada">
                    <span class="info">Salário Meli</span>
                    <span class="value">+ R$ 3.500,00</span>
                </div>
                <div class="transaction-item item-saida">
                    <span class="info">Aluguel da Moto</span>
                    <span class="value">- R$ 150,00</span>
                </div>
            </div>
        </section>

        <button class="btn-add">
            <span>+</span> Novo Registro
        </button>
    </div>
</body>
</html>
