<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance PRO - Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="main-wrapper">
        
        <div class="login-container sys-box" id="login-screen">
            <div class="box-header">
                <h2><i class="fas fa-lock"></i> AUTH_REQUIRED (LOGIN)</h2>
            </div>
            <div class="form-group">
                <p class="login-tip">Contas padrão:<br>• Usuário: <b>altair</b> / Senha: <b>123</b><br>• Usuário: <b>meli</b> / Senha: <b>456</b></p>
                
                <label>Usuário</label>
                <input type="text" id="login-username" placeholder="Digite seu usuário">
                
                <label>Senha</label>
                <input type="password" id="login-password" placeholder="••••••••">
                
                <button id="btn-login" class="btn-sys-primary">
                    <i class="fas fa-sign-in-alt"></i> ACESSAR_SISTEMA
                </button>
                <p id="login-error" class="error-msg"></p>
            </div>
        </div>

        <div class="container hidden" id="system-dashboard">
            <header class="system-header">
                <div class="header-left">
                    <i class="fas fa-wallet system-logo"></i>
                    <h1 id="app-title">FINANCE_PRO</h1>
                </div>
                <div class="header-right">
                    <span class="user-badge"><i class="fas fa-user"></i> <span id="current-user-name">USER</span></span>
                    <button class="btn-logout" id="btn-logout" title="Sair do Sistema">
                        <i class="fas fa-power-off"></i> LOGOUT
                    </button>
                </div>
            </header>

            <section class="dashboard-grid">
                <div class="balance-card main-balance">
                    <div class="card-header">
                        <h3>SALDO_DISPONÍVEL</h3>
                        <i class="fas fa-sack-dollar"></i>
                    </div>
                    <p class="balance-value" id="total-balance">R$ 0,00</p>
                </div>
                
                <div class="mini-cards-wrapper">
                    <div class="card entrada">
                        <div class="card-info">
                            <h3>ENTRADAS_TOTAIS</h3>
                            <p id="total-entries">R$ 0,00</p>
                        </div>
                        <i class="fas fa-arrow-trend-up icon-entries"></i>
                    </div>
                    <div class="card saida">
                        <div class="card-info">
                            <h3>DÍVIDAS_ATIVAS</h3>
                            <p id="total-expenses">R$ 0,00</p>
                        </div>
                        <i class="fas fa-arrow-trend-down icon-expenses"></i>
                    </div>
                </div>
            </section>

            <main class="control-panel">
                <section class="form-section sys-box">
                    <div class="box-header">
                        <h2><i class="fas fa-plus-circle"></i> NOVO_REGISTRO</h2>
                    </div>
                    <div class="form-group">
                        <label>Descrição</label>
                        <input type="text" id="trans-title" placeholder="Ex: Mercado, Salário">
                        
                        <label>Valor (R$)</label>
                        <input type="number" id="trans-value" placeholder="0,00">
                        
                        <label>Tipo de Fluxo</label>
                        <select id="trans-type">
                            <option value="entrada">ENTRADA (+)</option>
                            <option value="saida">DÍVIDA / GASTO (-)</option>
                        </select>
                        
                        <button id="btn-save" class="btn-sys-primary">
                            <i class="fas fa-save"></i> PROCESSAR
                        </button>
                    </div>
                </section>

                <section class="history-section sys-box">
                    <div class="box-header history-header">
                        <h2><i class="fas fa-list-ul"></i> REGISTROS_DO_SISTEMA</h2>
                        <button class="btn-sys-danger" id="btn-clear">
                            <i class="fas fa-trash-alt"></i> PURGE_DATA
                        </button>
                    </div>
                    <div class="transaction-list" id="list-container">
                        </div>
                </section>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
